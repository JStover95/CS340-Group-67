<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Customers · OSU Record Store</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/handlebars@4.7.8/dist/handlebars.min.js"></script>
  <script src="./js/data.js"></script>
  <script src="./js/layout.js"></script>
</head>
<body class="bg-gray-100 antialiased">
  <header id="site-header" class="fixed left-0 right-0 top-0 z-50 bg-gray-900 text-white shadow"></header>
  <div class="flex min-h-screen pt-14">
    <aside id="site-nav" class="fixed left-0 top-14 z-40 h-[calc(100vh-3.5rem)] w-56 shrink-0 overflow-y-auto border-r border-gray-200 bg-gray-50"></aside>
    <main class="ml-56 flex-1 overflow-x-auto p-8">
      <div class="flex items-center justify-between gap-4">
        <h2 class="text-2xl font-bold text-gray-900">Customers</h2>
        <a href="./customers-create.html" class="inline-flex rounded-md bg-indigo-600 px-4 py-2 text-sm font-medium text-white shadow hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2">
          Create +
        </a>
      </div>
      <div class="mt-6 rounded-lg border border-gray-200 bg-white shadow-sm">
        <table class="min-w-full divide-y divide-gray-200">
          <thead class="bg-gray-100">
            <tr>
              <th scope="col" class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wide text-gray-600">Customer ID</th>
              <th scope="col" class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wide text-gray-600">First Name</th>
              <th scope="col" class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wide text-gray-600">Last Name</th>
              <th scope="col" class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wide text-gray-600">Email</th>
              <th scope="col" class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wide text-gray-600">Shipping Address</th>
              <th scope="col" class="px-4 py-3 text-right text-xs font-semibold uppercase tracking-wide text-gray-600">Actions</th>
            </tr>
          </thead>
          <tbody id="customers-body" class="divide-y divide-gray-200 bg-white"></tbody>
        </table>
      </div>
    </main>
  </div>

  <script id="tpl-customers-rows" type="text/x-handlebars-template">
    {{#if customers.length}}
      {{#each customers}}
      <tr class="hover:bg-gray-50">
        <td class="whitespace-nowrap px-4 py-3 text-sm text-gray-900">{{customerId}}</td>
        <td class="whitespace-nowrap px-4 py-3 text-sm text-gray-900">{{firstName}}</td>
        <td class="whitespace-nowrap px-4 py-3 text-sm text-gray-900">{{lastName}}</td>
        <td class="px-4 py-3 text-sm text-gray-700">{{email}}</td>
        <td class="max-w-xs px-4 py-3 text-sm text-gray-600">{{shippingAddress}}</td>
        <td class="whitespace-nowrap px-4 py-3 text-right text-sm">
          <a href="./customers-edit.html?id={{customerId}}" class="mr-2 inline-flex rounded-md border border-gray-300 bg-white px-3 py-1.5 font-medium text-gray-700 shadow-sm hover:bg-gray-50">Edit</a>
          <button type="button" class="btn-delete text-red-600 hover:text-red-800" data-customer-id="{{customerId}}">Delete</button>
        </td>
      </tr>
      {{/each}}
    {{else}}
      <tr>
        <td colspan="6" class="px-4 py-8 text-center text-sm text-gray-500">No records found.</td>
      </tr>
    {{/if}}
  </script>

  <script>
    window.dataReady.then(function () {
      var tpl = Handlebars.compile(document.getElementById("tpl-customers-rows").innerHTML);
      document.getElementById("customers-body").innerHTML = tpl({ customers: AppData.customers });

      document.getElementById("customers-body").addEventListener("click", function (e) {
        var btn = e.target.closest(".btn-delete");
        if (!btn) return;
        if (
          !confirm(
            "Are you sure you want to delete this customer? This action cannot be undone."
          )
        )
          return;
        // TODO: Backend DELETE — FK if Orders reference this Customer.
      });
    });
  </script>
</body>
</html>
