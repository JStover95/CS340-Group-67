<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Artist · OSU Record Store</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/handlebars@4.7.8/dist/handlebars.min.js"></script>
  <script src="./js/api.js"></script>
  <script src="./js/layout.js"></script>
</head>
<body class="bg-gray-100 antialiased">
  <header id="site-header" class="fixed left-0 right-0 top-0 z-50 bg-gray-900 text-white shadow"></header>
  <div class="flex min-h-screen pt-14">
    <aside id="site-nav" class="fixed left-0 top-14 z-40 h-[calc(100vh-3.5rem)] w-56 shrink-0 overflow-y-auto border-r border-gray-200 bg-gray-50"></aside>
    <main class="ml-56 flex-1 p-8">
      <h2 class="text-2xl font-bold text-gray-900">Create Artist</h2>
      <form id="form-artist" class="mt-6 max-w-xl space-y-5 rounded-lg border border-gray-200 bg-white p-6 shadow-sm">
        <div>
          <label for="name" class="block text-sm font-medium text-gray-700">Name</label>
          <input id="name" name="name" type="text" required class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 shadow-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500" />
        </div>
        <div>
          <label for="country" class="block text-sm font-medium text-gray-700">Country</label>
          <input id="country" name="country" type="text" class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 shadow-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500" />
        </div>
        <div>
          <label for="bio" class="block text-sm font-medium text-gray-700">Bio</label>
          <textarea id="bio" name="bio" rows="4" class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 shadow-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500"></textarea>
        </div>
        <div>
          <button type="submit" class="inline-flex rounded-md bg-indigo-600 px-4 py-2 text-sm font-medium text-white shadow hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2">
            Submit
          </button>
        </div>
      </form>
    </main>
  </div>
  <script>
    document.getElementById("form-artist").addEventListener("submit", function (e) {
      e.preventDefault();
      var fd = new FormData(e.target);
      AppApi.createArtist({
        name: fd.get("name"),
        country: fd.get("country") || null,
        bio: fd.get("bio") || null,
      })
        .then(function () {
          window.location.href = "./artists.html";
        })
        .catch(function (err) {
          alert(err.message || "Failed to create artist.");
        });
    });
  </script>
</body>
</html>
