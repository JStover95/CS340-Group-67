<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Genres · OSU Record Store</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/handlebars@4.7.8/dist/handlebars.min.js"></script>
  <script src="./js/data.js"></script>
  <script src="./js/api.js"></script>
  <script src="./js/layout.js"></script>
</head>
<body class="bg-gray-100 antialiased">
  <header id="site-header" class="fixed left-0 right-0 top-0 z-50 bg-gray-900 text-white shadow"></header>
  <div class="flex min-h-screen pt-14">
    <aside id="site-nav" class="fixed left-0 top-14 z-40 h-[calc(100vh-3.5rem)] w-56 shrink-0 overflow-y-auto border-r border-gray-200 bg-gray-50"></aside>
    <main class="ml-56 flex-1 overflow-x-auto p-8">
      <div class="flex items-center justify-between gap-4">
        <h2 class="text-2xl font-bold text-gray-900">Genres</h2>
        <a href="./genres-create.html" class="inline-flex rounded-md bg-indigo-600 px-4 py-2 text-sm font-medium text-white shadow hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2">
          Create +
        </a>
      </div>
      <div class="mt-6 rounded-lg border border-gray-200 bg-white shadow-sm">
        <table class="min-w-full divide-y divide-gray-200">
          <thead class="bg-gray-100">
            <tr>
              <th scope="col" class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wide text-gray-600">Genre ID</th>
              <th scope="col" class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wide text-gray-600">Name</th>
              <th scope="col" class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wide text-gray-600">Description</th>
              <th scope="col" class="px-4 py-3 text-right text-xs font-semibold uppercase tracking-wide text-gray-600">Actions</th>
            </tr>
          </thead>
          <tbody id="genres-body" class="divide-y divide-gray-200 bg-white"></tbody>
        </table>
      </div>
    </main>
  </div>

  <script id="tpl-genres-rows" type="text/x-handlebars-template">
    {{#if genres.length}}
      {{#each genres}}
      <tr class="hover:bg-gray-50">
        <td class="whitespace-nowrap px-4 py-3 text-sm text-gray-900">{{genreId}}</td>
        <td class="whitespace-nowrap px-4 py-3 text-sm font-medium text-gray-900"><a href="./genres-edit.html?id={{genreId}}" class="text-indigo-600 hover:text-indigo-800 hover:underline">{{name}}</a></td>
        <td class="max-w-xl px-4 py-3 text-sm text-gray-600">{{description}}</td>
        <td class="whitespace-nowrap px-4 py-3 text-right text-sm">
          <a href="./genres-edit.html?id={{genreId}}" class="mr-2 inline-flex rounded-md border border-gray-300 bg-white px-3 py-1.5 font-medium text-gray-700 shadow-sm hover:bg-gray-50">Edit</a>
          <button type="button" class="btn-delete text-red-600 hover:text-red-800" data-genre-id="{{genreId}}">Delete</button>
        </td>
      </tr>
      {{/each}}
    {{else}}
      <tr>
        <td colspan="4" class="px-4 py-8 text-center text-sm text-gray-500">No records found.</td>
      </tr>
    {{/if}}
  </script>

  <script>
    (function () {
      var tbody = document.getElementById("genres-body");
      var tpl = Handlebars.compile(
        document.getElementById("tpl-genres-rows").innerHTML
      );

      function render(genres) {
        tbody.innerHTML = tpl({ genres: genres });
      }

      function load() {
        return AppApi.fetchGenres()
          .then(render)
          .catch(function () {
            alert("Failed to load genres from the server.");
            render([]);
          });
      }

      load();

      tbody.addEventListener("click", function (e) {
        var btn = e.target.closest(".btn-delete");
        if (!btn) return;
        var id = btn.getAttribute("data-genre-id");
        if (
          !confirm(
            "Are you sure you want to delete this genre? This action cannot be undone."
          )
        )
          return;
        AppApi.deleteGenre(id)
          .then(function (result) {
            if (result.ok) return load();
            alert(result.message || "Resource not found.");
          })
          .catch(function () {
            alert("Failed to delete genre.");
          });
      });
    })();
  </script>
</body>
</html>
