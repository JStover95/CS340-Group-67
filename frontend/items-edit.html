<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edit Item · OSU Record Store</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/handlebars@4.7.8/dist/handlebars.min.js"></script>
  <script src="./js/utils.js"></script>
  <script src="./js/api.js"></script>
  <script src="./js/layout.js"></script>
</head>
<body class="bg-gray-100 antialiased">
  <header id="site-header" class="fixed left-0 right-0 top-0 z-50 bg-gray-900 text-white shadow"></header>
  <div class="flex min-h-screen pt-14">
    <aside id="site-nav" class="fixed left-0 top-14 z-40 h-[calc(100vh-3.5rem)] w-56 shrink-0 overflow-y-auto border-r border-gray-200 bg-gray-50"></aside>
    <main class="ml-56 flex-1 p-8">
      <div id="err-not-found" class="hidden rounded-md border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-800"></div>
      <div id="form-wrap" class="hidden">
        <h2 class="text-2xl font-bold text-gray-900">Edit Item</h2>
        <form id="form-item" class="mt-6 max-w-xl space-y-5 rounded-lg border border-gray-200 bg-white p-6 shadow-sm"></form>
      </div>
    </main>
  </div>

  <script id="tpl-item-form" type="text/x-handlebars-template">
        <div>
          <span class="block text-sm font-medium text-gray-700">Type</span>
          <div class="mt-2 flex gap-6">
            <label class="inline-flex items-center gap-2 text-sm text-gray-800">
              <input type="radio" name="type" value="record" class="h-4 w-4 border-gray-300 text-indigo-600 focus:ring-indigo-500" {{checked type 'record'}} />
              record
            </label>
            <label class="inline-flex items-center gap-2 text-sm text-gray-800">
              <input type="radio" name="type" value="CD" class="h-4 w-4 border-gray-300 text-indigo-600 focus:ring-indigo-500" {{checked type 'CD'}} />
              CD
            </label>
          </div>
        </div>
        <div>
          <label for="title" class="block text-sm font-medium text-gray-700">Title</label>
          <input id="title" name="title" type="text" required value="{{title}}" class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 shadow-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500" />
        </div>
        <div>
          <label for="price" class="block text-sm font-medium text-gray-700">Price</label>
          <input id="price" name="price" type="number" step="0.01" min="0" required value="{{price}}" class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 shadow-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500" />
        </div>
        <div>
          <label for="description" class="block text-sm font-medium text-gray-700">Description</label>
          <textarea id="description" name="description" rows="4" class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 shadow-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500">{{description}}</textarea>
        </div>
        <div>
          <span class="block text-sm font-medium text-gray-700">Current image (filename)</span>
          <p class="mt-1 rounded-md bg-gray-100 px-3 py-2 font-mono text-sm text-gray-500">{{#if image}}{{image}}{{else}}None{{/if}}</p>
          <label for="image" class="mt-3 block text-sm font-medium text-gray-700">Replace cover image</label>
          <input id="image" name="imageFile" type="file" accept="image/*" class="mt-1 block w-full text-sm text-gray-600 file:mr-4 file:rounded-md file:border-0 file:bg-indigo-50 file:px-4 file:py-2 file:text-sm file:font-medium file:text-indigo-700 hover:file:bg-indigo-100" />
        </div>
        <div>
          <label for="artistId" class="block text-sm font-medium text-gray-700">Artist</label>
          <select id="artistId" name="artistId" required class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 shadow-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500">
            {{#each artists}}
            <option value="{{artistId}}" {{selected artistId ../artistId}}>{{name}}</option>
            {{/each}}
          </select>
        </div>
        <div>
          <label for="genreId" class="block text-sm font-medium text-gray-700">Genre</label>
          <select id="genreId" name="genreId" required class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 shadow-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500">
            {{#each genres}}
            <option value="{{genreId}}" {{selected genreId ../genreId}}>{{name}}</option>
            {{/each}}
          </select>
        </div>
        <div>
          <button type="submit" class="inline-flex rounded-md bg-indigo-600 px-4 py-2 text-sm font-medium text-white shadow hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2">
            Submit
          </button>
        </div>
  </script>

  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var id = params.get("id");

      Promise.all([
        AppApi.fetchItems(),
        AppApi.fetchArtists(),
        AppApi.fetchGenres(),
      ])
        .then(function (results) {
          var item = AppUtils.findById(results[0], "itemId", id);
          if (!item) {
            var err = document.getElementById("err-not-found");
            err.textContent =
              "Item not found for id: " + (id != null ? id : "(missing)");
            err.classList.remove("hidden");
            return;
          }
          var ctx = Object.assign({}, item, {
            artists: results[1],
            genres: results[2],
          });
          var tpl = Handlebars.compile(
            document.getElementById("tpl-item-form").innerHTML
          );
          document.getElementById("form-item").innerHTML = tpl(ctx);
          document.getElementById("form-wrap").classList.remove("hidden");

          document.getElementById("form-item").addEventListener("submit", function (e) {
            e.preventDefault();
            var fd = new FormData(e.target);
            var fileEl = document.getElementById("image");
            var image =
              fileEl.files && fileEl.files[0]
                ? fileEl.files[0].name
                : item.image || null;
            AppApi.updateItem(item.itemId, {
              type: fd.get("type"),
              title: fd.get("title"),
              price: Number(fd.get("price")),
              description: fd.get("description") || null,
              image: image,
              artistId: Number(fd.get("artistId")),
              genreId: Number(fd.get("genreId")),
            })
              .then(function () {
                window.location.href = "./items.html";
              })
              .catch(function (err) {
                alert(err.message || "Failed to update item.");
              });
          });
        })
        .catch(function () {
          alert("Failed to load item data from the server.");
        });
    })();
  </script>
</body>
</html>
