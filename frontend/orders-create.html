<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Order · OSU Record Store</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/handlebars@4.7.8/dist/handlebars.min.js"></script>
  <script src="./js/utils.js"></script>
  <script src="./js/api.js"></script>
  <script src="./js/layout.js"></script>
  <script src="./js/orders-form.js"></script>
</head>
<body class="bg-gray-100 antialiased">
  <header id="site-header" class="fixed left-0 right-0 top-0 z-50 bg-gray-900 text-white shadow"></header>
  <div class="flex min-h-screen pt-14">
    <aside id="site-nav" class="fixed left-0 top-14 z-40 h-[calc(100vh-3.5rem)] w-56 shrink-0 overflow-y-auto border-r border-gray-200 bg-gray-50"></aside>
    <main class="ml-56 flex-1 overflow-x-auto p-8">
      <h2 class="text-2xl font-bold text-gray-900">Create Order</h2>
      <div id="form-mount"></div>
    </main>
  </div>

  <script id="tpl-create-order" type="text/x-handlebars-template">
      <form id="form-order" class="mt-6 max-w-5xl space-y-8 rounded-lg border border-gray-200 bg-white p-6 shadow-sm">
        <div class="grid gap-6 md:grid-cols-2">
          <div>
            <label for="customerId" class="block text-sm font-medium text-gray-700">Customer</label>
            <select id="customerId" name="customerId" required class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 shadow-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500">
              {{#each customers}}
              <option value="{{customerId}}">{{label}}</option>
              {{/each}}
            </select>
          </div>
          <div>
            <label for="statusId" class="block text-sm font-medium text-gray-700">Status</label>
            <select id="statusId" name="statusId" required class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 shadow-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500">
              {{#each statuses}}
              <option value="{{statusId}}">{{statusCode}}</option>
              {{/each}}
            </select>
          </div>
        </div>

        <div class="grid gap-6 md:grid-cols-2">
          <div>
            <span class="block text-sm font-medium text-gray-700">Order Timestamp</span>
            <p id="order-timestamp-display" class="mt-1 rounded-md bg-gray-100 px-3 py-2 text-sm text-gray-500">
              Will be set automatically by the backend when this order is created.
            </p>
          </div>
          <div>
            <span class="block text-sm font-medium text-gray-700">Order Total</span>
            <p id="order-total-display" class="mt-1 rounded-md bg-gray-100 px-3 py-2 text-sm font-medium tabular-nums text-gray-500">$0.00</p>
          </div>
        </div>

        <div>
          <h3 class="text-lg font-semibold text-gray-900">Order Items</h3>
          <p class="mt-1 text-sm text-gray-500">Manage line items below. Prices and line totals are derived for display only; the authoritative values will come from the backend.</p>

          <div class="mt-4 overflow-x-auto rounded-lg border border-gray-200">
            <table class="min-w-full divide-y divide-gray-200">
              <thead class="bg-gray-100">
                <tr>
                  <th class="px-2 py-2 text-left text-xs font-semibold uppercase tracking-wide text-gray-600">Item</th>
                  <th class="w-28 px-2 py-2 text-left text-xs font-semibold uppercase tracking-wide text-gray-600">Quantity</th>
                  <th class="px-2 py-2 text-left text-xs font-semibold uppercase tracking-wide text-gray-600">Price</th>
                  <th class="px-2 py-2 text-left text-xs font-semibold uppercase tracking-wide text-gray-600">Line Total</th>
                  <th class="px-2 py-2 text-right text-xs font-semibold uppercase tracking-wide text-gray-600">Actions</th>
                </tr>
              </thead>
              <tbody id="order-items-body" class="divide-y divide-gray-200 bg-white">
                <tr id="order-empty-msg">
                  <td colspan="5" class="px-4 py-6 text-center text-sm text-gray-500">No order items added yet.</td>
                </tr>
              </tbody>
            </table>
          </div>

          <button type="button" id="btn-add-order-item" class="mt-4 inline-flex rounded-md border border-dashed border-indigo-300 bg-white px-4 py-2 text-sm font-medium text-indigo-700 hover:bg-indigo-50">
            Add Item
          </button>
        </div>

        <div>
          <button type="submit" class="inline-flex rounded-md bg-indigo-600 px-4 py-2 text-sm font-medium text-white shadow hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2">
            Submit
          </button>
        </div>
      </form>
  </script>

  <script>
    Promise.all([
      AppApi.fetchCustomers(),
      AppApi.fetchStatuses(),
      AppApi.fetchItems(),
    ])
      .then(function (results) {
        var customersDd = results[0].map(function (c) {
          return {
            customerId: c.customerId,
            label: AppUtils.customerLabel(c),
          };
        });
        var tpl = Handlebars.compile(
          document.getElementById("tpl-create-order").innerHTML
        );
        document.getElementById("form-mount").innerHTML = tpl({
          customers: customersDd,
          statuses: results[1],
        });
        initOrdersForm({ mode: "create", items: results[2] });
      })
      .catch(function () {
        alert("Failed to load order form data from the server.");
      });
  </script>
</body>
</html>
