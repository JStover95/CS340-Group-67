<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edit Genre · OSU Record Store</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/handlebars@4.7.8/dist/handlebars.min.js"></script>
  <script src="./js/data.js"></script>
  <script src="./js/layout.js"></script>
</head>
<body class="bg-gray-100 antialiased">
  <header id="site-header" class="fixed left-0 right-0 top-0 z-50 bg-gray-900 text-white shadow"></header>
  <div class="flex min-h-screen pt-14">
    <aside id="site-nav" class="fixed left-0 top-14 z-40 h-[calc(100vh-3.5rem)] w-56 shrink-0 overflow-y-auto border-r border-gray-200 bg-gray-50"></aside>
    <main class="ml-56 flex-1 p-8">
      <div id="err-not-found" class="hidden rounded-md border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-800"></div>
      <div id="form-wrap" class="hidden">
        <h2 class="text-2xl font-bold text-gray-900">Edit Genre</h2>
        <form id="form-genre" class="mt-6 max-w-xl space-y-5 rounded-lg border border-gray-200 bg-white p-6 shadow-sm"></form>
      </div>
    </main>
  </div>

  <script id="tpl-genre-form" type="text/x-handlebars-template">
        <div>
          <label for="name" class="block text-sm font-medium text-gray-700">Name</label>
          <input id="name" name="name" type="text" required value="{{name}}" class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 shadow-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500" />
        </div>
        <div>
          <label for="description" class="block text-sm font-medium text-gray-700">Description</label>
          <textarea id="description" name="description" rows="4" class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 shadow-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500">{{description}}</textarea>
        </div>
        <div>
          <button type="submit" class="inline-flex rounded-md bg-indigo-600 px-4 py-2 text-sm font-medium text-white shadow hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2">
            Submit
          </button>
        </div>
  </script>

  <script>
    window.dataReady.then(function () {
      var params = new URLSearchParams(window.location.search);
      var id = params.get("id");
      var row = AppUtils.findById(AppData.genres, "genreId", id);
      if (!row) {
        var err = document.getElementById("err-not-found");
        err.textContent = "Genre not found for id: " + (id != null ? id : "(missing)");
        err.classList.remove("hidden");
        return;
      }
      var tpl = Handlebars.compile(document.getElementById("tpl-genre-form").innerHTML);
      document.getElementById("form-genre").innerHTML = tpl(row);
      document.getElementById("form-wrap").classList.remove("hidden");

      document.getElementById("form-genre").addEventListener("submit", function (e) {
        e.preventDefault();
        var fd = new FormData(e.target);
        var obj = {};
        fd.forEach(function (v, k) {
          obj[k] = v;
        });
        obj.genreId = row.genreId;
        alert("Update Genre (no backend yet):\n\n" + JSON.stringify(obj, null, 2));
      });
    });
  </script>
</body>
</html>
