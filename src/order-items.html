<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Order Items · OSU Record Store</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/handlebars@4.7.8/dist/handlebars.min.js"></script>
  <script src="./js/data.js"></script>
  <script src="./js/layout.js"></script>
</head>
<body class="bg-gray-100 antialiased">
  <header id="site-header" class="fixed left-0 right-0 top-0 z-50 bg-gray-900 text-white shadow"></header>
  <div class="flex min-h-screen pt-14">
    <aside id="site-nav" class="fixed left-0 top-14 z-40 h-[calc(100vh-3.5rem)] w-56 shrink-0 overflow-y-auto border-r border-gray-200 bg-gray-50"></aside>
    <main class="ml-56 flex-1 overflow-x-auto p-8">
      <div class="flex items-center justify-between gap-4">
        <h2 class="text-2xl font-bold text-gray-900">Order Items</h2>
        <a href="./order-items-create.html" class="inline-flex rounded-md bg-indigo-600 px-4 py-2 text-sm font-medium text-white shadow hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2">
          Create +
        </a>
      </div>
      <div class="mt-6 rounded-lg border border-gray-200 bg-white shadow-sm">
        <table class="min-w-full divide-y divide-gray-200">
          <thead class="bg-gray-100">
            <tr>
              <th scope="col" class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wide text-gray-600">Order Item ID</th>
              <th scope="col" class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wide text-gray-600">Order ID</th>
              <th scope="col" class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wide text-gray-600">Item ID</th>
              <th scope="col" class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wide text-gray-600">Order</th>
              <th scope="col" class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wide text-gray-600">Item</th>
              <th scope="col" class="px-4 py-3 text-right text-xs font-semibold uppercase tracking-wide text-gray-600">Quantity</th>
              <th scope="col" class="px-4 py-3 text-right text-xs font-semibold uppercase tracking-wide text-gray-600">Price</th>
              <th scope="col" class="px-4 py-3 text-right text-xs font-semibold uppercase tracking-wide text-gray-600">Line Total</th>
              <th scope="col" class="px-4 py-3 text-right text-xs font-semibold uppercase tracking-wide text-gray-600">Actions</th>
            </tr>
          </thead>
          <tbody id="order-items-body" class="divide-y divide-gray-200 bg-white"></tbody>
        </table>
      </div>
    </main>
  </div>

  <script id="tpl-order-items-rows" type="text/x-handlebars-template">
    {{#if rows.length}}
      {{#each rows}}
      <tr class="hover:bg-gray-50">
        <td class="whitespace-nowrap px-4 py-3 text-sm text-gray-900">{{orderItemId}}</td>
        <td class="whitespace-nowrap px-4 py-3 text-sm text-gray-900">{{orderId}}</td>
        <td class="whitespace-nowrap px-4 py-3 text-sm text-gray-900">{{itemId}}</td>
        <td class="max-w-xs px-4 py-3 text-sm text-gray-800">{{orderLabel}}</td>
        <td class="max-w-xs px-4 py-3 text-sm font-medium text-gray-900">{{itemTitle}}</td>
        <td class="whitespace-nowrap px-4 py-3 text-right text-sm text-gray-900">{{quantity}}</td>
        <td class="whitespace-nowrap px-4 py-3 text-right text-sm text-gray-900">{{currency derivedPrice}}</td>
        <td class="whitespace-nowrap px-4 py-3 text-right text-sm font-medium text-gray-900">{{currency derivedLineTotal}}</td>
        <td class="whitespace-nowrap px-4 py-3 text-right text-sm">
          <a href="./order-items-edit.html?id={{orderItemId}}" class="mr-2 inline-flex rounded-md border border-gray-300 bg-white px-3 py-1.5 font-medium text-gray-700 shadow-sm hover:bg-gray-50">Edit</a>
          <button type="button" class="btn-delete text-red-600 hover:text-red-800" data-order-item-id="{{orderItemId}}">Delete</button>
        </td>
      </tr>
      {{/each}}
    {{else}}
      <tr>
        <td colspan="9" class="px-4 py-8 text-center text-sm text-gray-500">No records found.</td>
      </tr>
    {{/if}}
  </script>

  <script>
    window.dataReady.then(function () {
      var tbody = document.getElementById("order-items-body");
      var tpl = Handlebars.compile(
        document.getElementById("tpl-order-items-rows").innerHTML
      );
      function buildRows() {
        return AppData.orderItems.map(function (oi) {
          var order = AppUtils.findById(AppData.orders, "orderId", oi.orderId);
          var item = AppUtils.findById(AppData.items, "itemId", oi.itemId);
          var unit = item != null ? Number(item.price) : NaN;
          var qty = Number(oi.quantity);
          var derivedPrice = Number.isFinite(unit) ? unit : null;
          var derivedLineTotal =
            Number.isFinite(unit) && Number.isFinite(qty) ? unit * qty : null;
          return Object.assign({}, oi, {
            orderLabel: AppUtils.orderItemOrderLabel(order),
            itemTitle: item ? item.title : "—",
            derivedPrice: derivedPrice,
            derivedLineTotal: derivedLineTotal,
          });
        });
      }
      function render() {
        tbody.innerHTML = tpl({ rows: buildRows() });
      }
      render();

      tbody.addEventListener("click", function (e) {
        var btn = e.target.closest(".btn-delete");
        if (!btn) return;
        var id = btn.getAttribute("data-order-item-id");
        if (
          !confirm(
            "Are you sure you want to delete this order item? This action cannot be undone."
          )
        )
          return;
        if (AppUiMutations.removeByIdKey("orderItems", "orderItemId", id)) render();
        // TODO: Backend DELETE for OrderItems when API exists.
      });
    });
  </script>
</body>
</html>
